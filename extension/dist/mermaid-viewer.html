<!DOCTYPE html>
<html>

<head>
    <style>
        @font-face {
            font-family: 'OpenDyslexic';
            src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'OpenDyslexic';
            src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
            color: #333333;
            font-family: 'OpenDyslexic', sans-serif;
        }

        #graph {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #graph svg {
            max-width: 100%;
            height: auto !important;
        }

        /* Make nodes interactive securely without layout jitter */
        g.mindmap-node {
            cursor: pointer !important;
            /* Only transition aesthetic properties to avoid bounding box shake during reflows */
            transition: fill 0.15s ease, stroke 0.15s ease, filter 0.15s ease;
        }

        g.mindmap-node rect,
        g.mindmap-node path,
        g.mindmap-node circle,
        g.mindmap-node polygon {
            transition: all 0.15s ease;
            transform-box: fill-box;
            transform-origin: center center;
        }

        g.mindmap-node text,
        g.mindmap-node tspan {
            transition: all 0.1s ease;
            transform-box: fill-box;
            transform-origin: center center;
        }

        g.mindmap-node:hover rect,
        g.mindmap-node:hover path,
        g.mindmap-node:hover circle,
        g.mindmap-node:hover polygon {
            fill: rgba(74, 144, 217, 0.95) !important;
            stroke: rgba(255, 255, 255, 0.3) !important;
            stroke-width: 2px !important;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
            transform: scale(1.1);
        }

        g.mindmap-node:hover text,
        g.mindmap-node:hover tspan {
            fill: #ffffff !important;
            font-weight: 800 !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div id="graph"></div>
    <script src="mermaid.min.js"></script>
    <script src="mermaid-viewer.js"></script>
</body>

</html>
